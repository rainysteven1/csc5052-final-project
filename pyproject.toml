[tool.ruff]
cache-dir = ".cache/ruff"
line-length = 120
extend-exclude = ["services/agent/gen"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["F401"]

[tool.pyright]
exclude = [
    ".git",
    "**/__pycache__",
    ".cache",
    ".idea",
    ".vscode",
    ".venv",
    ".devbox",
    "db/",
    "data/",
    "temp/",
    "logs/",
    "vendor/",
    "output/",
    "**/node_modules",
    "**/.*",
    "alembic/versions/*_auto.py",
]

[tool.pytest.ini_options]
testpaths = ["services/agent/tests"]
