seed = 42

[speaksure.runtime]
config_version = "speaksure-runtime-v1"
context_provider = "config"
coaching_provider = "hybrid"
asr_provider = "local"
asr_backend = "onnx"
# asr_backend = "grpc"
asr_backend_grpc_target = "127.0.0.1:50052"
asr_onnx_model_dir = "services/agent/models/asr/onnx-community__whisper-large-v3-turbo"
asr_grpc_target = "127.0.0.1:50052"
agent_grpc_bind = "127.0.0.1:50051"
asr_grpc_bind = "127.0.0.1:50052"
# Local in-process mode:
# asr_provider = "local"
# asr_backend = "onnx"
# Preferred microservice mode:
#
# Suggested gRPC binds for local microservices:
# agent_grpc_target = "127.0.0.1:50051"
#
# MiniMax judgment/coaching/feedback uses env vars:
# MINIMAX_API_KEY=...
# MINIMAX_BASE_URL=...
# SPEAKSURE_LLM_MODEL=MiniMax-M2.7
lexical_provider = "rule"
prosody_provider = "rule"
disfluency_provider = "rule"

[speaksure.wandb]
project = "speaksure-runtime"
mode = "online"

[speaksure.prompts]
lexical_system = "prompts/lexical_system.md"
lexical_user = "prompts/lexical_user.md"
prosody_system = "prompts/prosody_system.md"
prosody_user = "prompts/prosody_user.md"
disfluency_system = "prompts/disfluency_system.md"
disfluency_user = "prompts/disfluency_user.md"
coaching_system = "prompts/coaching_system.md"
coaching_user = "prompts/coaching_user.md"
lexical_repair_schema = "prompts/schemas/lexical_result.json"
disfluency_repair_schema = "prompts/schemas/disfluency_result.json"
prosody_repair_schema = "prompts/schemas/prosody_result.json"
coaching_repair_schema = "prompts/schemas/coaching_result.json"
judgment_system = "prompts/judgment_system.md"
judgment_user = "prompts/judgment_user.md"
feedback_system = "prompts/feedback_system.md"
feedback_user = "prompts/feedback_user.md"
json_repair_system = "prompts/json_repair_system.md"
json_repair_user = "prompts/json_repair_user.md"
judgment_repair_schema = "prompts/schemas/judgment_result.json"
feedback_repair_schema = "prompts/schemas/feedback_segments_result.json"

[speaksure.rules]
lexical_rules = "rules/lexical_rules.toml"
disfluency_rules = "rules/disfluency_rules.toml"
prosody_rules = "rules/prosody_rules.toml"
context_defaults = "rules/context_defaults.toml"
scoring_rules = "rules/scoring_rules.toml"
feedback_fallback_rules = "rules/feedback_fallback_rules.toml"

[speaksure.contexts.interview.weights]
lexical = 0.35
prosody = 0.30
disfluency = 0.20
context = 0.15

[speaksure.contexts.interview]
style_constraints = ["避免过多弱化表达", "建议回答更直接"]

[speaksure.contexts.presentation.weights]
lexical = 0.30
prosody = 0.35
disfluency = 0.20
context = 0.15

[speaksure.contexts.presentation]
style_constraints = ["保持节奏稳定", "控制长停顿"]

[speaksure.contexts.academic.weights]
lexical = 0.25
prosody = 0.25
disfluency = 0.20
context = 0.30

[speaksure.contexts.academic]
style_constraints = ["允许适度谨慎表达", "避免连续自我修正"]

[speaksure.contexts.business.weights]
lexical = 0.35
prosody = 0.25
disfluency = 0.20
context = 0.20

[speaksure.contexts.business]
style_constraints = ["表达应直接清晰", "减少模糊承诺词"]

[speaksure.contexts.casual.weights]
lexical = 0.25
prosody = 0.25
disfluency = 0.25
context = 0.25

[speaksure.contexts.casual]
style_constraints = ["自然表达即可"]
