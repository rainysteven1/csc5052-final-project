[scoring]
filler_weight = 0.12
self_repair_weight = 0.16
repetition_weight = 0.18
repetition_token_pattern = "\\b[\\w']+\\b"

[explanations]
filler = "This segment includes fillers that interrupt fluency."
repeat = "This segment includes repetition that slows message delivery."
self_repair = "This segment includes self-repairs that weaken delivery stability."

