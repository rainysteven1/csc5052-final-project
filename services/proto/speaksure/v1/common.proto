syntax = "proto3";

package speaksure.v1;

message KeyValue {
  string key = 1;
  string value = 2;
}

message ArtifactMetadata {
  string asr_model_version = 1;
  string lexical_model_version = 2;
  string prosody_model_version = 3;
  string disfluency_model_version = 4;
  string config_version = 5;
  bool fallback_mode = 6;
  repeated KeyValue providers = 7;
  repeated KeyValue paths = 8;
}

message AnalysisDigest {
  string request_id = 1;
  string scenario = 2;
  string transcript = 3;
  string generated_at = 4;
  string language = 5;
  string asr_mode = 6;
  string workflow_engine = 7;
  int32 segment_count = 8;
  ArtifactMetadata artifacts = 9;
  repeated KeyValue meta = 10;
}
