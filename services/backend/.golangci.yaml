version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

formatters:
  enable:
    - gofmt

issues:
  exclude-use-default: false
  exclude-rules:
    - path: ".*_test\\.go"
      linters:
        - errcheck
