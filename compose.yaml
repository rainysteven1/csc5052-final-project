services:
  agent:
    build:
      context: .
      dockerfile: services/agent/Dockerfile
      args:
        UV_EXPORT_GROUP: runtime
    container_name: speaksure-agent
    env_file:
      - .env
    environment:
      SPEAKSURE_REPO_ROOT: /app
      SPEAKSURE_AGENT_SERVICE_ROOT: /app/services/agent
      SPEAKSURE_AGENT_DATA_ROOT: /app/services/agent/data
    ports:
      - "50051:50051"
    volumes:
      - ./services/agent/config:/app/services/agent/config:ro
      - ./services/agent/data:/app/services/agent/data
      - ./services/agent/data/samples:/app/services/agent/data/samples:ro
      - ./services/agent/models:/app/services/agent/models
