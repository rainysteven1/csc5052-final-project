# Trainer configuration — all data paths are relative to the project root.

seed = 42

[wandb]
mode = "online"
project = "News2ETF-Agent-Tools"
entity = "rainysteven_team"

[major.data]
raw_data_dir = "./trainer/data/labeled/finbert"
batch_size = 64
use_content = false
val_ratio = 0.15

[major.model]
pretrained_model = "./trainer/data/pretrained_models/Erlangshen-Roberta-110M-Sentiment"
num_level1 = 8
num_sentiment = 3
max_seq_length = 128
dropout = 0.1

[major.training]
output_dir = "./trainer/checkpoints/major"
early_stopping_patience = 2
epochs_phase1 = 3
epochs_phase2 = 5
bert_lr = 2e-5
heads_lr = 1e-4
weight_decay = 0.02
warmup_ratio = 0.1
grad_accum_steps = 1
max_grad_norm = 1.0
fp16 = true
save_checkpoint = true

[sub.setfit.data]
raw_data_dir = "./trainer/data/labeled/setfit"
batch_size = 32
val_ratio = 0.2
cluster_sampling_majors = ["科技信息", "基础设施/公共", "主题策略"]
prepare_max_workers = 4
confidence_floor = 0.75

[sub.setfit.data.random]
samples_per_class = 50
min_samples_per_class = 10

[sub.setfit.data.cluster]
n_cap = 1000
n_clusters = 300
samples_per_cluster = 3
min_samples_per_class = 30
hard_negative_boost = 3
confused_pairs = [["区域经济", "宽基/策略"], ["宽基/策略", "民企/综合策略"], ["民企/综合策略", "区域经济"]]

[sub.setfit.model]
pretrained_model = "./trainer/data/pretrained_models/mengzi-bert-base-fin"
label_stats = "./trainer/data/labeled/setfit/label_stats.json"
max_seq_length = 128

[sub.setfit.training]
output_dir = "./trainer/checkpoints/setfit"
num_iterations = 10
num_epochs = 1
learning_rate = 7.5e-6
save_checkpoint = false

[sub.supervised.data]
raw_data_dir = "./trainer/data/labeled/setfit"
batch_size = 32
val_ratio = 0.15
max_seq_length = 128
use_content = true

[sub.supervised.model]
pretrained_model = "./trainer/data/pretrained_models/mengzi-bert-base-fin"
dropout = 0.1

[sub.supervised.training]
output_dir = "./trainer/checkpoints/sub"
epochs_phase1 = 3
epochs_phase2 = 5
bert_lr = 2e-5
heads_lr = 1e-4
weight_decay = 0.02
warmup_ratio = 0.1
grad_accum_steps = 1
max_grad_norm = 1.0
fp16 = true
early_stopping_patience = 2
focal_loss_gamma = 2.0
save_checkpoint = true

[signals.tcn]
sequence_length = 10
hidden_size = 16
num_layers = 1
dropout = 0.25

[signals.isolation_forest]
contamination = 0.1
n_estimators = 100

[signals.lightgbm]
num_leaves = 7
learning_rate = 0.03
n_estimators = 200

[signals.dataset]
raw_data_path = "./trainer/data/labeled/signals/raw.parquet"
output_sentiment = "./trainer/data/labeled/signals/sentiment_weekly.parquet"
train_end_week = "2023-12-31"
walk_forward_enabled = true
walk_forward_min_train_years = 2
freq = "daily"
cross_industry = true
forecast_days = 5
target_mode = "meta_excess_return"
label_stats_path = "./data/label_stats.json"

[signals.ohlcv]
ohlcv_path = "./data/converted/主题ETF历史量价.parquet"
industry_dict_path = "./data/industry_dict.json"
etf_info_path = "./data/converted/主题ETF信息表-快照1_主题ETF.parquet"

[signals.training]
epochs_pretrain = 5
epochs_finetune = 3
batch_size = 64
lr = 0.001
num_heads = 4
anomaly_threshold = 0.03
output_checkpoint = "./trainer/checkpoints/signals"
deploy_onnx_dir = "./trainer/models/signals/latest"

[predict]
# Set to true when the machine has a usable accelerator visible to PyTorch,
# but ONNX Runtime does not expose CUDAExecutionProvider.
# This only affects scheduler heuristics/logging; it does not change ORT providers.
assume_accelerated_device = false

# Phase 1 major prediction:
#   - reads raw news parquet shards from major_input_dir / major_input_glob
#   - writes major-labeled parquet shards into major_output_dir
#   - uses major_batch_size
major_onnx_dir = "./trainer/models/major"
major_output_dir = "./trainer/data/labeled/signals/major_only"
major_workers = 1
major_shard_workers = 2
major_input_dir = "./trainer/data/news_raw"
major_input_glob = "*.parquet"
major_batch_size = 256

# Phase 2 sub prediction:
#   - reads explicitly from sub_input_dir / sub_input_glob
#   - falls back to major_output_dir only if sub_input_* is not configured
#   - auto-discovers backend from sub_onnx_dir/<backend>/<major>
#   - validates every required major exists in exactly one backend folder
#   - writes final labeled parquet shards into output_dir
#   - uses sub_batch_size
sub_onnx_dir = "./trainer/models/sub/0407-1415"
sub_shard_workers = 1
sub_major_workers = 2
sub_input_dir = "./trainer/data/labeled/signals/major_only"
sub_input_glob = "raw.parquet"
output_dir = "./trainer/data/labeled/signals/raw"
sub_batch_size = 256
major_max_length = 128
sub_max_length = 128
