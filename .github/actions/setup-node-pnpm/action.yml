name: Setup Node and pnpm
description: Set up Node.js, activate a pinned pnpm version via Corepack, and cache the pnpm store.

inputs:
  node-version:
    description: Node.js version to install.
    required: true
  pnpm-version:
    description: pnpm version to activate via Corepack.
    required: true
  lockfile-path:
    description: Path to the pnpm lockfile used to derive the cache key.
    required: true
  cache-key-suffix:
    description: Suffix used to distinguish pnpm cache entries across workflows and services.
    required: true

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Enable Corepack pnpm
      shell: bash
      run: |
        corepack enable
        corepack prepare pnpm@${{ inputs.pnpm-version }} --activate
        pnpm --version

    - name: Cache pnpm store
      uses: actions/cache@v4
      with:
        path: ~/.local/share/pnpm/store
        key: ${{ runner.os }}-pnpm-${{ inputs.cache-key-suffix }}-${{ hashFiles(inputs.lockfile-path) }}
        restore-keys: |
          ${{ runner.os }}-pnpm-${{ inputs.cache-key-suffix }}-
