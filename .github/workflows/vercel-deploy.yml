name: Frontend Deploy

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/vercel-deploy.yml"
      - "services/frontend/**"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.15.3"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: vercel-production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create GitHub deployment
        id: deployment
        uses: chrnorm/deployment-action@v2
        with:
          token: ${{ github.token }}
          environment: vercel-production
          initial-status: in_progress
          description: Deploy services/frontend to Vercel

      - name: Set up Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          lockfile-path: services/frontend/pnpm-lock.yaml
          cache-key-suffix: vercel-frontend

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy frontend to Vercel
        id: deploy
        working-directory: services/frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          url="$(vercel deploy --prod --yes --token="${VERCEL_TOKEN}")"
          echo "url=${url}" >> "$GITHUB_OUTPUT"

      - name: Mark deployment success
        if: success()
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ github.token }}
          state: success
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          environment-url: ${{ steps.deploy.outputs.url }}
          log-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Mark deployment failure
        if: failure() && steps.deployment.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ github.token }}
          state: failure
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          log-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
