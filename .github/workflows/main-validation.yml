name: Service Validation

on:
  pull_request:
    branches: [main]
    paths:
      - "services/backend/.golangci.yaml"
      - ".github/workflows/main-validation.yml"
      - "scripts/check_agent.sh"
      - "scripts/check_backend.sh"
      - "scripts/check_fake_backend.sh"
      - "scripts/check_frontend.sh"
      - "services/agent/**"
      - "services/backend/go/**"
      - "services/fake-backend/**"
      - "services/frontend/**"
      - "services/proto/**"
  push:
    branches: [main]
    paths:
      - "services/backend/.golangci.yaml"
      - ".github/workflows/main-validation.yml"
      - "scripts/check_agent.sh"
      - "scripts/check_backend.sh"
      - "scripts/check_fake_backend.sh"
      - "scripts/check_frontend.sh"
      - "services/agent/**"
      - "services/backend/go/**"
      - "services/fake-backend/**"
      - "services/frontend/**"
      - "services/proto/**"

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  PNPM_VERSION: "9.15.3"
  GOLANGCI_LINT_VERSION: "v2.11"

jobs:
  changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      agent: ${{ steps.filter.outputs.agent }}
      backend: ${{ steps.filter.outputs.backend }}
      fake_backend: ${{ steps.filter.outputs.fake_backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            agent:
              - '.github/workflows/main-validation.yml'
              - 'scripts/check_agent.sh'
              - 'services/agent/**'
              - 'services/proto/**'
            backend:
              - 'services/backend/.golangci.yaml'
              - '.github/workflows/main-validation.yml'
              - 'scripts/check_backend.sh'
              - 'services/backend/go/**'
              - 'services/proto/**'
            fake_backend:
              - '.github/workflows/main-validation.yml'
              - 'scripts/check_fake_backend.sh'
              - 'services/fake-backend/**'
            frontend:
              - '.github/workflows/main-validation.yml'
              - 'scripts/check_frontend.sh'
              - 'services/frontend/**'

  agent:
    name: Agent CI
    needs: changes
    if: needs.changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Run agent checks
        env:
          AGENT_CHECK_PROFILE: ci
        run: ./scripts/check_agent.sh

  backend:
    name: Backend CI
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/backend/go/go.mod
          cache-dependency-path: services/backend/go/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: services/backend/go
          args: --config=../.golangci.yaml ./...

      - name: Run backend checks
        run: ./scripts/check_backend.sh

  fake-backend:
    name: Fake Backend CI
    needs: changes
    if: needs.changes.outputs.fake_backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          lockfile-path: services/fake-backend/pnpm-lock.yaml
          cache-key-suffix: fake-backend

      - name: Run fake backend checks
        run: ./scripts/check_fake_backend.sh

  frontend:
    name: Frontend CI
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          lockfile-path: services/frontend/pnpm-lock.yaml
          cache-key-suffix: frontend

      - name: Run frontend checks
        run: ./scripts/check_frontend.sh

  summary:
    name: Validation Summary
    if: always()
    needs:
      - changes
      - agent
      - backend
      - fake-backend
      - frontend
    runs-on: ubuntu-latest
    steps:
      - name: Publish summary
        env:
          AGENT_CHANGED: ${{ needs.changes.outputs.agent }}
          BACKEND_CHANGED: ${{ needs.changes.outputs.backend }}
          FAKE_BACKEND_CHANGED: ${{ needs.changes.outputs.fake_backend }}
          FRONTEND_CHANGED: ${{ needs.changes.outputs.frontend }}
          AGENT_RESULT: ${{ needs.agent.result }}
          BACKEND_RESULT: ${{ needs.backend.result }}
          FAKE_BACKEND_RESULT: ${{ needs['fake-backend'].result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
        run: |
          label_for() {
            local changed="$1"
            local result="$2"

            if [ "$changed" != "true" ]; then
              echo "⚪ skipped"
              return
            fi

            case "$result" in
              success) echo "✅ success" ;;
              failure) echo "❌ failure" ;;
              cancelled) echo "🟡 cancelled" ;;
              skipped) echo "⚪ skipped" ;;
              *) echo "🟣 $result" ;;
            esac
          }

          summarize() {
            local service="$1"
            local changed="$2"
            local result="$3"
            local status_label

            status_label="$(label_for "$changed" "$result")"

            if [ "$changed" = "true" ]; then
              echo "| $service | yes | $status_label |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| $service | no | $status_label |" >> "$GITHUB_STEP_SUMMARY"
            fi
          }

          build_changed_list() {
            local names=()

            [ "$AGENT_CHANGED" = "true" ] && names+=("agent")
            [ "$BACKEND_CHANGED" = "true" ] && names+=("backend")
            [ "$FAKE_BACKEND_CHANGED" = "true" ] && names+=("fake-backend")
            [ "$FRONTEND_CHANGED" = "true" ] && names+=("frontend")

            if [ "${#names[@]}" -eq 0 ]; then
              echo "none"
              return
            fi

            local IFS=', '
            echo "${names[*]}"
          }

          CHANGED_SERVICES="$(build_changed_list)"

          {
            echo "## Service Validation Summary"
            echo
            echo "Changed services: \`${CHANGED_SERVICES}\`"
            echo
            echo "| Service | Changed | Result |"
            echo "| --- | --- | --- |"
          } >> "$GITHUB_STEP_SUMMARY"

          summarize "agent" "$AGENT_CHANGED" "$AGENT_RESULT"
          summarize "backend" "$BACKEND_CHANGED" "$BACKEND_RESULT"
          summarize "fake-backend" "$FAKE_BACKEND_CHANGED" "$FAKE_BACKEND_RESULT"
          summarize "frontend" "$FRONTEND_CHANGED" "$FRONTEND_RESULT"

          {
            echo
            echo "Notes:"
            echo "- \`Changed = no\` means the service was skipped because no matching files changed."
            echo "- \`⚪ skipped\` under \`Result\` is expected for unchanged services."
            echo "- Any changed service that reports \`❌ failure\` fails the workflow."
          } >> "$GITHUB_STEP_SUMMARY"

          if { [ "$AGENT_CHANGED" = "true" ] && [ "$AGENT_RESULT" = "failure" ]; } || \
             { [ "$BACKEND_CHANGED" = "true" ] && [ "$BACKEND_RESULT" = "failure" ]; } || \
             { [ "$FAKE_BACKEND_CHANGED" = "true" ] && [ "$FAKE_BACKEND_RESULT" = "failure" ]; } || \
             { [ "$FRONTEND_CHANGED" = "true" ] && [ "$FRONTEND_RESULT" = "failure" ]; }; then
            exit 1
          fi
